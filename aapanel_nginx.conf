server {
    listen 80;
    server_name 10ur.me www.10ur.me;
    
    # 500 hatasını çözmek için geçici olarak yönlendirmeyi kapatalım.
    # HTTP çalışıyorsa sorun SSL veya path kaynaklıdır.
    # return 301 https://$server_name$request_uri;
    
    # Root path düzeltmesi: Genellikle domain adı ile oluşturulur.
    # Lütfen sunucunuzda bu klasörün varlığını kontrol edin!
    root /www/wwwroot/10ur.me/dist;
    
    index index.html index.htm;
    
    location / {
        try_files $uri $uri/ /index.html;
    }
}

server {
    listen 443 ssl; 
    server_name 10ur.me www.10ur.me;

    # Olası path hatası burada düzeltildi: 'my-site' yerine '10ur.me'
    root /www/wwwroot/10ur.me/dist;
    
    index index.html index.htm;

    # SSL Dosyalarınızın BURADA olduğundan %100 emin olun.
    # aaPanel panosunda "SSL" sekmesinde bu yollar yazar.
    ssl_certificate    /www/server/panel/vhost/cert/10ur.me/fullchain.pem;
    ssl_certificate_key    /www/server/panel/vhost/cert/10ur.me/privkey.pem;
    
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    
    # Basit log pathleri
    access_log  /www/wwwlogs/10ur.me.log;
    error_log  /www/wwwlogs/10ur.me.error.log;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~ .*\.(gif|jpg|jpeg|png|bmp|swf)$
    {
        expires      30d;
        error_log /dev/null;
        access_log /dev/null;
    }

    location ~ .*\.(js|css)?$
    {
        expires      12h;
        error_log /dev/null;
        access_log /dev/null;
    }
}
